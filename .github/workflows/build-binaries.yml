name: Build CrabMagick daemon binaries

on:
  push:
    paths:
      - 'rust/crates/**/*.rs'
      - 'rust/crates/**/*.toml'
      - 'rust/Cargo.toml'
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            variant: x86_64
            target: x86_64-unknown-linux-musl
            rustflags: "-C target-feature=+crt-static"
          - runner: ubuntu-24.04
            variant: x86_64-avx2
            target: x86_64-unknown-linux-musl
            rustflags: "-C target-feature=+crt-static,+avx2,+fma"
          - runner: ubuntu-24.04
            variant: x86_64-avx512
            target: x86_64-unknown-linux-musl
            rustflags: "-C target-feature=+crt-static,+avx512f,+avx512bw,+avx512cd,+avx512dq,+avx512vl"
          - runner: ubuntu-24.04-arm
            variant: aarch64
            target: aarch64-unknown-linux-gnu
            rustflags: "-C target-feature=+neon"
          - runner: ubuntu-24.04-arm
            variant: aarch64-sve
            target: aarch64-unknown-linux-gnu
            rustflags: "-C target-feature=+neon,+sve,+sve2"

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: contains(matrix.variant, 'x86_64')
        run: sudo apt-get install -y musl-tools

      - name: Cache Rust deps
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "rust -> target"
          key: ${{ matrix.variant }}

      - name: Build daemon
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: |
          cd rust
          cargo build -p crabmagick-daemon --release --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/release/crabmagick-daemon \
             ../bin/crabmagick-${{ matrix.variant }}-linux
          chmod +x ../bin/crabmagick-${{ matrix.variant }}-linux

      - name: Verify binary
        run: |
          file bin/crabmagick-${{ matrix.variant }}-linux
          ls -lh bin/crabmagick-${{ matrix.variant }}-linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: crabmagick-${{ matrix.variant }}
          path: bin/crabmagick-${{ matrix.variant }}-linux

  commit:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: bin
          merge-multiple: true

      - name: Mark binaries executable
        run: chmod +x bin/crabmagick-*-linux

      - name: Commit binaries
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bin/
          git diff --cached --quiet || git commit -m "ci: update pre-built daemon binaries"
          git push
